# MCP Gateway Configuration
# ═══════════════════════════════════════════════════════════════════════════════
# Backends can be defined here or added at runtime via the Admin API / Web UI.
# Environment variables: ${VAR} or ${VAR:-default}
#
# Web UI:       http://localhost:8080/
# MCP Endpoint: http://localhost:8080/mcp
# Admin API:    http://localhost:8080/admin/backends
# ═══════════════════════════════════════════════════════════════════════════════

gateway:
  host: "${MCP_GATEWAY_HOST:-0.0.0.0}"
  port: ${MCP_GATEWAY_PORT:-8080}
  log_level: "${MCP_GATEWAY_LOG_LEVEL:-info}"
  tool_cache_ttl: 300
  lazy_schema_loading: true
  state_file: "state.json"
  auto_reconnect: true
  reconnect_interval: 30
  # api_key: "${MCP_GATEWAY_API_KEY}"

backends: []
# See config.example.yaml for backend configuration examples.
